name: Update m3u file from EPG

on:
  schedule:
    - cron: '0 0 * * *'  # Изпълнение всеки ден в полунощ
  workflow_dispatch:  # Позволява ръчно стартиране

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
      # Стъпка 1: Проверка на репозитория
      - name: Checkout the repository
        uses: actions/checkout@v3

      # Стъпка 2: Инсталиране на Python
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.9'

      # Стъпка 3: Инсталиране на необходими зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # Стъпка 4: Изтегляне на EPG XML файл от първото хранилище
      - name: Download EPG XML
        run: |
          curl -L -o epg.xml https://raw.githubusercontent.com/belchew/General/refs/heads/main/all-2days.basic.epg.xml

      # Стъпка 5: Изтегляне на m3u файла
      - name: Download sources.m3u
        run: |
          curl -L -o sources.m3u https://raw.githubusercontent.com/belchew/General/refs/heads/main/output.m3u

      # Стъпка 6: Изпълнение на Python скрипт за актуализиране на m3u
      - name: Update m3u file with EPG data
        run: |
          python scripts/parss.py

      # Стъпка 7: Качване на промените обратно в GitHub
      - name: Commit and push changes
        run: |
          git config --global user.name 'belchew'
          git config --global user.email 'belchew@outlook.com'
          git add sources.m3u
          git commit -m "Update m3u file with new data from EPG"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
