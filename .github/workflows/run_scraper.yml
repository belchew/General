name: Execute Python Script

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'  # Задайте версията на Python, ако е нужно

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt  # Инсталира зависимостите от requirements.txt

    - name: Run Python script
      run: |
        python scrapping.py  # Изпълнява вашия Python скрипт
