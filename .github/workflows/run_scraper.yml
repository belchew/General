name: Execute Python Script

on:
  push:
    branches:
      - main  # Изпълнява се, когато има нови промени в main клона
  pull_request:
    branches:
      - main  # Изпълнява се при пулл заявка към main клона

jobs:
  build:
    runs-on: ubuntu-latest  # Използва най-новата версия на Ubuntu за изпълнение

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2  # Проверява съдържанието на вашето хранилище

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'  # Можете да зададете точна версия на Python, напр. '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt  # Инсталира зависимостите, ако имате файл requirements.txt

    - name: Run Python script
      run: |
        python scrapping.py  # Изпълнява вашия Python скрипт
