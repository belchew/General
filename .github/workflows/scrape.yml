name: Scrape and Push TS Links

on:
  push:
    branches:
      - main  # Можеш да промениш на твоята основна клонка, ако е различна
#  schedule:
   # - cron: '0 0 * * *'  # Изпълнява се всеки ден в полунощ (можеш да промениш времето според нуждите)

jobs:
  scrape:
    runs-on: ubuntu-latest  # Използва последната версия на Ubuntu

    steps:
      # Стъпка 1: Клонирай репозитория
      - name: Checkout repository
        uses: actions/checkout@v2

      # Стъпка 2: Настройване на Python
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'  # Можеш да промениш версията на Python, ако използваш друга

      # Стъпка 3: Инсталиране на зависимостите (Playwright и GitPython)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright gitpython
          playwright install  # Инсталира необходимите браузъри за Playwright

      # Стъпка 4: Изпълни Python скрипта
      - name: Run scrape script
        run: python scrape.py  # Тук посочи пътя до твоя Python скрипт (ако е в поддиректория, уточни пътя)

      # Стъпка 5: Комитирай и пусни промените към репозитория
      - name: Commit and Push changes
        run: |
          git config --global user.name "belchew"
          git config --global user.email "belchew@outlook.com"
          git add sources.m3u  # Добави промените в sources.m3u
          git commit -m "Update sources.m3u with new player sources"
          git push
