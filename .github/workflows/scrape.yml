name: Update sources.m3u

on:
  push:
    branches:
      - main  # или твоята основна клонка, в която искаш да стартираш скрипта
  pull_request:
    branches:
      - main  # или твоята основна клонка, ако искаш да стартираш при PR

jobs:
  run:
    runs-on: ubuntu-latest  # Може да избереш друга операционна система, ако е необходимо
    
    steps:
    # Стъпка 1: Клониране на репозитория
    - name: Checkout repository
      uses: actions/checkout@v2
    
    # Стъпка 2: Настройване на Python
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'  # Може да избереш друга версия на Python
    
    # Стъпка 3: Инсталиране на зависимостите
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    # Стъпка 4: Стартиране на Python скрипта
    - name: Update sources.m3u
      run: python scrape.py
