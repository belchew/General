name: Refresh

on:
  # При push в основния клон (можете да го промените, ако искате)
  push:
    branches:
      - main  # Изпълнява се при push в основния клон

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'  # Може да използвате конкретна версия ако е необходимо

      # Set up Git config
      - name: Set up Git config
        run: |
          git config --global user.email "belchew@outlook.com"  # Променете с вашия имейл
          git config --global user.name "belchew"  # Променете с вашето име

      # Install required packages (requests, pandas и други зависимости)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gitpython pandas

      # Run the Python script (за актуализиране на sources.m3u)
      - name: Run Python script
        run: |
          python scripts/scrapping.py  # Пътят към вашия Python скрипт, може да е различен

      # Commit and push changes to the repository (ако има промени в sources.m3u)
      - name: Commit and push changes
        run: |
          git add sources.m3u  # Добавяне на новия или обновен файл към git
          git commit -m "Update sources.m3u with new links" || echo "No changes to commit"  # Ако няма промени, пропуска commit-а
          git push origin main  # Push-ване на промените обратно в репозитория
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Използва автоматичния GitHub Token за аутентикация
