name: Run Python Script

on:
  push:
    branches:
      - main  # Изпълнява се, когато се направи push към главния клон (или други клонове, ако желаеш)

jobs:
  build:
    runs-on: ubuntu-latest  # Използва последната версия на Ubuntu

    steps:
      - name: Check out repository
        uses: actions/checkout@v2  # Клонира репозитория

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'  # Можеш да смениш версията на Python според нуждите

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Ако имаш нужда от зависимости, постави ги в requirements.txt

      - name: Run Python script
        run: python path/to/your/script.py  # Заменяй с пътя до твоя скрипт
        env:
          SOURCE_REPO_PATH: ${{ secrets.SOURCE_REPO_PATH }}  # Можеш да използваш GitHub Secrets за пътищата или други чувствителни данни
          DEST_REPO_PATH: ${{ secrets.DEST_REPO_PATH }}
