name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout на репозитория
      - name: Checkout repository
        uses: actions/checkout@v3

      # Настройка на Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-ve
