name: Refresh

on:
  push:
    branches:
      - main

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Set up Git config
        run: |
          git config --global user.email "belchew@outlook.com"
          git config --global user.name "belchew"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gitpython pandas

      - name: Run Python script
        run: |
          python scripts/scrapping.py

      - name: Commit and push changes if updated
        run: |
          git add sources.m3u
          git commit -m "Update sources.m3u with new links" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
