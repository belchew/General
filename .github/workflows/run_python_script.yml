name: Python script

on:
  push:
    branches:
      - main

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # Set up Git config
      - name: Set up Git config
        run: |
          git config --global user.email "belchew@outlook.com"
          git config --global user.name "belchew"

      # Install required packages (requests and gitpython)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gitpython

      # Set up authentication with PAT token for GitHub Actions
      - name: Set up GitHub authentication
        run: |
          git config --global url."https://${{ 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 }}@github.com".insteadOf "https://github.com"
      
      # Run the Python script
      - name: Run Python script
        run: python scripts/clone_and_commit.py
