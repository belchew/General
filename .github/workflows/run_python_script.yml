name: Run Python Script

on:
  push:
    branches:
      - main  # Trigger this workflow when code is pushed to the main branch
  pull_request:
    branches:
      - main  # Trigger on pull requests to the main branch (optional)

jobs:
  run-python-script:
    runs-on: ubuntu-latest  # Run on the latest Ubuntu environment

    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # Checkout your code

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'  # Specify the Python version (adjust as needed)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip  # Upgrade pip
          pip install pandas  # Install pandas
          pip install -r requirements.txt  # If you have a requirements file, install all dependencies

      - name: Run the script
        run: |
          python scripts/scrapping.py  # Replace with the actual path to your script
