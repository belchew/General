name: Run Python Script

on:
  push:
    branches:
      - main  # or the branch you want this to run on
  pull_request:
    branches:
      - main  # optional: triggers on pull requests to the main branch

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the script
        run: |
          python scripts/scrapping.py  # Replace with the actual script path
