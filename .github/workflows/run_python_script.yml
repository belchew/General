name: Refresh m3u Links

on:
  push:
    branches:
      - main  # Може да бъде друга клонка, ако е необходимо
  schedule:
    - cron: '3 * * * *'  # Всеки час, може да промените интервала

jobs:
  update-sources-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run scrapping script
        run: python scripts/scrapping.py  # Заменете с пътя до вашия Python скрипт

      - name: Update sources.m3u (if needed)
        run: |
          if [ -f "sources.m3u" ]; then
            echo "sources.m3u already exists, updating...";
          else
            echo "sources.m3u does not exist, creating a new one...";
            touch sources.m3u;
          fi
