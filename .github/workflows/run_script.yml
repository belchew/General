name: Run Python Script Every 30 Minutes

on:
  schedule:
    - cron: '*/30 * * * *'  # Изпълнява на всеки 30 минути
  push:
    branches:
      - main  # Изпълнява при push към main
  workflow_dispatch:  # Разрешава ръчно стартиране от GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest  # Използва последната версия на Ubuntu

    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # Извършва checkout на вашия код

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'  # Вие може да избере версия според нуждите си

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Инсталирайте зависимости от requirements.txt

      - name: Install additional dependencies for Selenium
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget curl  # Необходими за инсталиране на Chrome и драйвера

      - name: Download ChromeDriver
        run: |
          # Сваляйте най-новия ChromeDriver
          CHROMEDRIVER_VERSION=$(curl -sS chromedriver.storage.googleapis.com/LATEST_RELEASE)
          wget https://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver_linux64.zip
          unzip chromedriver_linux64.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/chromedriver

      - name: Check ChromeDriver version
        run: |
          chromedriver --version  # Проверява версията на ChromeDriver

      - name: Run the Python script
        run: |
          python core/scrapping.py  # Стартирайте вашия скрипт

      - name: Upload the result (sources.m3u)
        uses: actions/upload-artifact@v2  # Използвайте v2 за качване на артефакти
        with:
          name: sources-m3u
          path: sources.m3u  # Пътя до резултатния файл
