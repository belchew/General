name: Run Python Script Every 30 Minutes

on:
  schedule:
    - cron: '*/30 * * * *'  # Изпълнява на всеки 30 минути
  push:
    branches:
      - main  # Изпълнява при push към main

jobs:
  build:
    runs-on: ubuntu-latest  # Използва последната версия на Ubuntu

    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # Извършва checkout на кода от репозитория

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'  # Използва Python 3.x версия

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip

          # Проверка на версията на Chrome
          google-chrome --version

          # Изтегляне на съвместимия ChromeDriver за версия 135
          wget -q https://chromedriver.storage.googleapis.com/135.0.7049.84/chromedriver_linux64.zip -O chromedriver.zip

          # Проверка дали файлът е изтеглен
          if [ -f chromedriver.zip ]; then
            echo "chromedriver.zip е изтеглен успешно."

            # Показваме съдържанието на архива, за да се уверим, че е правилно изтеглен
            unzip -l chromedriver.zip

            # Разархивиране на ChromeDriver
            unzip chromedriver.zip
            mv chromedriver /usr/local/bin/
            chmod +x /usr/local/bin/chromedriver
          else
            echo "chromedriver.zip не е изтеглен правилно."
            exit 1
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Инсталира зависимостите от requirements.txt
          pip freeze  # За диагностика

      - name: Verify pandas installation
        run: |
          python -c "import pandas; print(pandas.__version__)"

      - name: Run the script
        run: |
          python core/scrapping.py  # Изпълнява твоя Python скрипт
