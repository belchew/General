name: Python CI

on:
  schedule:
    - cron: '*/30 * * * *'  # Изпълнява на всеки 30 минути
  push:
    branches:
      - main  # Изпълнява при push към main

jobs:
  build:
    runs-on: ubuntu-latest  # Използва последната версия на Ubuntu

    steps:
      - name: Checkout code
        uses: actions/checkout@v2  # Извършва checkout на кода от репозитория

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'  # Използва Python 3.x версия

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip
          curl -sS -L https://chromedriver.storage.googleapis.com/114.0.5735.90/chromedriver_linux64.zip -o chromedriver.zip
          unzip chromedriver.zip
          mv chromedriver /usr/local/bin/
          chmod +x /usr/local/bin/chromedriver

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt  # Инсталира зависимостите от requirements.txt
          pip freeze  # За диагностика

      - name: Verify pandas installation
        run: |
          python -c "import pandas; print(pandas.__version__)"

      - name: Run the script
        run: |
          python core/scrapping.py  # Изпълнява твоя Python скрипт

